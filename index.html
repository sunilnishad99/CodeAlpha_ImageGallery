<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('cars')">Cars</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">
    <div class="image nature"><img src="https://picsum.photos/id/1015/400"></div>
    <div class="image cars"><img src="https://picsum.photos/id/1011/400"></div>
    <div class="image nature"><img src="https://picsum.photos/id/1016/400"></div>
    <div class="image cars"><img src="https://picsum.photos/id/1018/400"></div>
    <div class="image nature"><img src="https://picsum.photos/id/1020/400"></div>
    <div class="image cars"><img src="https://picsum.photos/id/1024/400"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img">
    <div class="controls">
      <button id="prev">Prev</button>
      <button id="next">Next</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
